name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches-ignore: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Run tests
        run: npm run test:run

      - name: Build (tsup)
        run: npm run build

      - name: Smoke imports (ESM + CJS)
        run: |
          node scripts/smoke-import.mjs
          node scripts/smoke-import.cjs

      - name: Publish dry-run (verifies tarball contents)
        run: npm publish --dry-run
